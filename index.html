<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog IFRN — Grupo 6</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="logo">blog<span class="accent">.</span>ifrn</div>
      <nav class="nav-links">
        <button class="nav-btn active" data-tab="feed">Feed</button>
        <button class="nav-btn" data-tab="novo">Novo post</button>
        <button class="nav-btn" data-tab="coment">Comentar</button>
        <button class="nav-btn" data-tab="edit">Editar</button>
      </nav>
      <div class="menu-toggle" id="menu-toggle">
        <span></span><span></span><span></span>
      </div>
    </header>

    <!-- BODY -->
    <main class="main-body">

      <!-- FEED -->
      <section id="sec-feed" class="section active">
        <div class="stats-strip" id="stats-strip"></div>
        <div class="feed-header">
          <h2 class="section-title">Posts recentes</h2>
          <span class="post-count" id="post-count"></span>
        </div>
        <div class="filter-row" id="filter-pills"></div>
        <div class="cards-grid" id="feed-list"></div>
      </section>

      <!-- NOVO POST -->
      <section id="sec-novo" class="section">
        <div class="form-wrap">
          <div class="form-title">
            <span class="form-number">01</span>
            Novo post
          </div>
          <div id="t-novo" class="toast"></div>
          <div class="field">
            <label>Título</label>
            <input id="n-titulo" type="text" placeholder="Ex: Como usar JDBC com MySQL" autocomplete="off"/>
          </div>
          <div class="field">
            <label>Conteúdo</label>
            <textarea id="n-conteudo" placeholder="Escreva o conteúdo do post..."></textarea>
          </div>
          <div class="field">
            <label>Data de publicação</label>
            <input id="n-data" type="date"/>
          </div>
          <div class="btn-row">
            <button class="btn btn-accent" id="btn-publicar">Publicar</button>
            <button class="btn btn-ghost" id="btn-cancelar-novo">Cancelar</button>
          </div>
        </div>
      </section>

      <!-- COMENTAR -->
      <section id="sec-coment" class="section">
        <div class="form-wrap">
          <div class="form-title">
            <span class="form-number">02</span>
            Adicionar comentário
          </div>
          <div id="t-coment" class="toast"></div>
          <div class="field">
            <label>Post</label>
            <select id="c-post"></select>
          </div>
          <div class="field">
            <label>Comentário</label>
            <textarea id="c-texto" placeholder="Escreva seu comentário..."></textarea>
          </div>
          <div class="field">
            <label>Data</label>
            <input id="c-data" type="date"/>
          </div>
          <div class="btn-row">
            <button class="btn btn-accent" id="btn-add-coment">Publicar comentário</button>
          </div>
        </div>
      </section>

      <!-- EDITAR -->
      <section id="sec-edit" class="section">
        <div class="form-wrap">
          <div class="form-title">
            <span class="form-number">03</span>
            Editar / deletar post
          </div>
          <div id="t-edit" class="toast"></div>
          <div class="field">
            <label>Selecionar post</label>
            <select id="e-sel"></select>
          </div>
          <div class="divider"></div>
          <div class="field">
            <label>Título</label>
            <input id="e-titulo" type="text" autocomplete="off"/>
          </div>
          <div class="field">
            <label>Conteúdo</label>
            <textarea id="e-conteudo"></textarea>
          </div>
          <div class="field">
            <label>Data</label>
            <input id="e-data" type="date"/>
          </div>
          <div class="btn-row">
            <button class="btn btn-accent" id="btn-salvar">Salvar alterações</button>
            <button class="btn btn-danger" id="btn-deletar">Deletar post</button>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
